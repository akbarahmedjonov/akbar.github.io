<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akbar Ahmedjonov | Developer</title>
    <meta name="description" content="a self-taught developer who loves automation">
    
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        slate: {
                            850: '#1a2234',
                        }
                    }
                }
            }
        }
    </script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Nerd Fonts -->
    <link rel="stylesheet" href="https://www.nerdfonts.com/assets/css/webfont.css">
    
    <style>
        * {
            font-family: 'Inter', system-ui, sans-serif;
        }
        
        .font-mono {
            font-family: 'Fira Code', monospace;
        }
        
        [data-glow]::before,
        [data-glow]::after {
            pointer-events: none;
            content: "";
            position: absolute;
            inset: calc(var(--border-size) * -1);
            border: var(--border-size) solid transparent;
            border-radius: calc(var(--radius) * 1px);
            background-attachment: fixed;
            background-size: calc(100% + (2 * var(--border-size))) calc(100% + (2 * var(--border-size)));
            background-repeat: no-repeat;
            background-position: 50% 50%;
            mask: linear-gradient(transparent, transparent), linear-gradient(white, white);
            mask-clip: padding-box, border-box;
            mask-composite: intersect;
        }
        
        [data-glow]::before {
            background-image: radial-gradient(
                calc(var(--spotlight-size) * 0.75) calc(var(--spotlight-size) * 0.75) at
                calc(var(--x, 0) * 1px)
                calc(var(--y, 0) * 1px),
                hsl(var(--hue, 210) calc(var(--saturation, 100) * 1%) calc(var(--lightness, 50) * 1%) / var(--border-spot-opacity, 1)), transparent 100%
            );
            filter: brightness(2);
        }
        
        [data-glow]::after {
            background-image: radial-gradient(
                calc(var(--spotlight-size) * 0.5) calc(var(--spotlight-size) * 0.5) at
                calc(var(--x, 0) * 1px)
                calc(var(--y, 0) * 1px),
                hsl(0 100% 100% / var(--border-light-opacity, 1)), transparent 100%
            );
        }
        
        [data-glow] [data-glow-inner] {
            position: absolute;
            inset: 0;
            will-change: filter;
            opacity: var(--outer, 1);
            border-radius: calc(var(--radius) * 1px);
            border-width: calc(var(--border-size) * 20);
            filter: blur(calc(var(--border-size) * 10));
            background: none;
            pointer-events: none;
            border: none;
        }
        
        @keyframes pathAnimation {
            0% { stroke-dashoffset: 1000; opacity: 0.1; }
            50% { opacity: 0.3; }
            100% { stroke-dashoffset: 0; opacity: 0.1; }
        }
        
        .animated-path {
            stroke-dasharray: 1000;
            animation: pathAnimation 25s linear infinite;
        }
        
        .animated-path:nth-child(odd) {
            animation-direction: reverse;
            animation-duration: 30s;
        }
        
        html {
            scroll-behavior: smooth;
        }
        
        body {
            overflow-x: hidden;
        }
    </style>
</head>
<body class="bg-gray-50 dark:bg-neutral-950 transition-colors duration-300">
    <div id="app"></div>
    
    <!-- Main Module -->
    <script type="module" src="./main.js"></script>
</body>
</html>
